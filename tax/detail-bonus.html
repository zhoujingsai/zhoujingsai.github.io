<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <title>收入纳税明细详情</title>
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <link
      rel="stylesheet"
      href="https://at.alicdn.com/t/c/font_3771354_gxx1tulrykg.css"
    />
    <link rel="stylesheet" href="index.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body class="detail-page detail-bonus-page">
    <header>
      <a class="header-back" href="index.html" data-back>
        <span class="header-icon iconfont icon-fanhui"></span>
        返回
      </a>
      <div class="header-title">收入纳税明细详情</div>
      <a class="header-shensu">申诉</a>
    </header>

    <div class="card section-card">
      <div class="card-title">
        <div class="card-title-dot"></div>
        <div>纳税明细信息</div>
      </div>
      <div class="card-body detail-summary" data-summary-body></div>
    </div>

    <div class="card section-card">
      <div class="card-title">
        <div class="card-title-dot"></div>
        <div>纳税明细-基础情况</div>
      </div>

      <div class="card-body">
        <div class="card-item">
          <div>所得项目小类：</div>
          <div data-subcategory></div>
        </div>
        <div class="card-item">
          <div>扣缴义务人名称：</div>
          <div data-company></div>
        </div>
        <div class="card-item">
          <div>扣缴义务人纳税人<br />识别号：</div>
          <div data-taxpayer-id></div>
        </div>
        <div class="card-item">
          <div>主管税务机关：</div>
          <div data-tax-office></div>
        </div>
        <div class="card-item">
          <div>申报渠道：</div>
          <div>其他</div>
        </div>
        <div class="card-item">
          <div>申报日期：</div>
          <div data-declaration-date></div>
        </div>
        <div class="card-item" style="margin-bottom: 2px">
          <div>税款所属期：</div>
          <div data-period></div>
        </div>
      </div>
    </div>

    <div class="card section-card">
      <div class="card-title">
        <div class="card-title-dot"></div>
        <div>收入与扣除详情</div>
      </div>
      <div class="card-body bonus-body" data-income-body></div>
    </div>

    <div class="card section-card">
      <div class="card-title">
        <div class="card-title-dot"></div>
        <div>税款计算</div>
      </div>
      <div class="card-body bonus-body" data-tax-body></div>
    </div>

    <div class="policy-link">查看政策说明</div>

    <script src="data.js"></script>
    <script src="tax-calculator.js"></script>
    <script src="detail-bonus.js"></script>
  </body>
</html>
